        <fieldset>
            <legend>Registration</legend>
            <div>
                <div>
                <label class="co" id="fr">First Name</label>
                <input type="text" 
                    id="firstname"
                    class="ci"
                    pattern="(?!.*fuck)[A-Za-z]{2,}"
                    name="firstname"
                    placeholder="First Name" required>
                </div>
                <div>
                <label class="co" id="lm">Last Name</label>
                <input type="text"
                    id="lastname"
                    class="ci"
                    pattern="(?!.*fuck)[A-Za-z]{2,}"
                    name="lastname"
                    placeholder="Last Name" required> 
                </div>
                <div>
                <label id="em">Email</label>
                <input type="email"
                    id="email"
                    pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                    name="eamil"
                    placeholder="Email">
                </div>
                <div>
                <label class="co" id="ps">Password</label>
                <input type="password" 
                    name="password_one"
                    id="password_one"
                    onblur="passEquality()"
                    placeholder="Password" required>
                </div>
                <div>
                <label id="pr">Password Again</label>
                <input type="password"
                    name="password_two"
                    id="password_two"
                    onblur="passEquality()"
                    placeholder="Password Again">
                </div>
                <div>
                <label>Reveal Password</label>
                <button onclick="revealPasswords()"
                        type="button"
                        id="revealpass"
                        name="revealpass">
                    <i class="fas fa-eye-slash" 
                       id="eye"></i></button>
                </div>
                <div>
                <label>Submit Form</label>
                <input type="button" 
                    name="submit"
                    value="submit"
                    onclick="validateForm()">
                </div> 
            </div>
